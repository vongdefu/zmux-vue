name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn' # 📌 启用 yarn 缓存加速打包

      - name: Install Dependencies 📦
        run: yarn install --frozen-lockfile # 📌 使用 lockfile 锁定版本，适合 CI 环境

      - name: Build Project 🏗️
        run: yarn build # 📌 执行 Vite 打包，默认输出到 dist 目录

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 打包生成的文件夹
          branch: gh-pages # 自动推送到 gh-pages 分支