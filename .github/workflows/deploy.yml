name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "yarn"

      - name: Install Dependencies 📦
        run: yarn install

      - name: Build Project 🏗️
        run: yarn build # 📌 执行 Vite 打包，默认输出到 dist 目录

      - name: Deploy to GitHub Pages 🚀
        uses: actions/deploy-pages@v4
        # with:
        #   folder: dist # Vite 打包生成的文件夹
        #   branch: gh-pages # 自动推送到 gh-pages 分支